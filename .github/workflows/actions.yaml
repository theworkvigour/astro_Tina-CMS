name: CI/CD - Build & Deploy to Cloudflare Workers

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  check-astro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn run check:astro

  build-and-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check-astro]
    strategy:
      fail-fast: false
      matrix:
        locale: [en, fr, de, es, pt, zh]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable

      - name: Build (${{ matrix.locale }})
        run: yarn run build
        env:
          SITE_LOCALE: ${{ matrix.locale }}

      - name: Debug before deploy (${{ matrix.locale }})
        run: |
          npx wrangler --version
          ls -la dist/server/ | head -10
          echo "--- wrangler.json ---"
          cat dist/server/wrangler.json
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then echo "ACCOUNT_ID: MISSING"; else echo "ACCOUNT_ID: set (${#CLOUDFLARE_ACCOUNT_ID} chars)"; fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "API_TOKEN: MISSING"; else echo "API_TOKEN: set (${#CLOUDFLARE_API_TOKEN} chars)"; fi

      - name: Deploy to Cloudflare Workers (${{ matrix.locale }})
        run: |
          npx wrangler deploy \
            --config dist/server/wrangler.json \
            --name vectoflare-${{ matrix.locale }} 2>&1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set SESSION_SECRET on Worker (${{ matrix.locale }})
        run: |
          echo "${{ secrets.SESSION_SECRET }}" | \
            npx wrangler secret put SESSION_SECRET \
              --name vectoflare-${{ matrix.locale }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
