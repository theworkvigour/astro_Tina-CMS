name: CI/CD - Build & Deploy to Cloudflare Workers

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run check

  build-and-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        locale: [en, fr, de, es, pt, zh]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Build (${{ matrix.locale }})
        run: npm run build
        env:
          SITE_LOCALE: ${{ matrix.locale }}

      - name: Deploy to Cloudflare Workers (${{ matrix.locale }})
        run: |
          npx wrangler deploy \
            --config dist/server/wrangler.json \
            --name vectoflare-${{ matrix.locale }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set SESSION_SECRET on Worker (${{ matrix.locale }})
        run: |
          echo "${{ secrets.SESSION_SECRET }}" | \
            npx wrangler secret put SESSION_SECRET \
              --name vectoflare-${{ matrix.locale }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
