hero_text:
  tagline: Contact
  title: Let's talk boats.

contact_form:
  id: form
  title: Send us a message
  subtitle: For quotes, technical questions or partnership enquiries, drop us a line. We reply within one business day.
  email_to: hello@vectoflare.example
  submit_button: Send message
  success_message: Thanks! Your message has landed in our inbox. We will reply within one business day.
  error_message: Something went wrong sending your message. Please try again or email us directly.
  fields:
    - { name: firstName, label: First Name, row: 1, placeholder: 'John' }
    - { name: lastName, label: Last Name, row: 1, placeholder: 'Doe' }
    - { name: companyName, label: Company Name, row: 2, placeholder: 'Acme Marine Ltd.' }
    - { name: address, label: Address, row: 3, placeholder: '123 Marine Drive, Suite 4' }
    - { name: zip, label: 'Zip / Postal Code', row: 4, placeholder: '90210' }
    - { name: country, label: Country, row: 4, type: select, placeholder: 'Select your country', optionsKey: countries }
    - { name: email, label: E-mail, row: 5, type: email, placeholder: 'you@example.com' }
    - { name: tel, label: TEL, row: 5, type: tel, withCountryCode: true, placeholder: '555 123 4567' }
    - { name: subject, label: Subject, row: 6, placeholder: 'Quote request for RIB 450' }
    - { name: message, label: Message, row: 7, type: textarea, rows: 6, placeholder: 'Tell us about your project, timeline, and any specific requirements…' }
  consent:
    required: true
    text: 'I agree to the processing of my personal data in accordance with the'
    link_text: 'Privacy Policy'
    link_href: '/privacy'
    error_message: 'Please confirm that you accept the Privacy Policy before submitting.'
