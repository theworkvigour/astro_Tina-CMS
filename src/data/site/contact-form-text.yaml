submit_button:
  en: Send message
  zh: 发送消息
  fr: Envoyer
  de: Nachricht senden
  es: Enviar mensaje
  pt: Enviar mensagem

success_message:
  en: Thanks! Your message has landed in our inbox. We will reply within one business day.
  zh: 谢谢！您的消息已发送。我们会在一个工作日内回复。
  fr: Merci ! Votre message a bien été envoyé. Nous vous répondrons sous un jour ouvré.
  de: Vielen Dank! Ihre Nachricht ist eingegangen. Wir antworten innerhalb eines Werktags.
  es: ¡Gracias! Su mensaje ha sido enviado. Le responderemos en un día hábil.
  pt: Obrigado! Sua mensagem foi enviada. Responderemos em um dia útil.

error_message:
  en: Something went wrong sending your message. Please try again or email us directly.
  zh: 发送消息时出错。请重试或直接给我们发送邮件。
  fr: Une erreur est survenue. Veuillez réessayer ou nous envoyer un e-mail directement.
  de: Beim Senden Ihrer Nachricht ist ein Fehler aufgetreten. Bitte versuchen Sie es erneut.
  es: Ocurrió un error al enviar su mensaje. Intente de nuevo o escríbanos directamente.
  pt: Ocorreu um erro ao enviar sua mensagem. Tente novamente ou envie-nos um e-mail.

captcha_label:
  en: 'Anti-spam: please solve the following'
  zh: 防垃圾：请解答以下问题
  fr: 'Anti-spam : veuillez résoudre'
  de: 'Anti-Spam: bitte lösen Sie'
  es: 'Anti-spam: por favor resuelva'
  pt: 'Anti-spam: por favor resolva'

